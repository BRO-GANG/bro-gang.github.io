<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRO GANG Light AI</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff;display:flex;height:100vh}
#sidebar{width:260px;background:#111;border-right:1px solid #222;padding:10px}
#logo{display:flex;gap:10px;align-items:center;margin-bottom:10px}
#logo img{width:40px;height:40px;border-radius:50%}
#chat{flex:1;overflow-y:auto;padding:15px}
.message{margin:10px 0;padding:10px;border-radius:10px;max-width:75%;white-space:pre-wrap}
.user{background:#1a73e8;margin-left:auto}
.bot{background:#2a2a2a}
#error{background:#8b0000}
#inputArea{display:flex;padding:10px;border-top:1px solid #222;position:fixed;bottom:0;left:260px;right:0;background:#0b0b0b}
#input{flex:1;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:8px}
button{margin-left:5px;padding:10px;border:none;border-radius:8px;background:#1a73e8;color:#fff;cursor:pointer}
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo">
    <img src="https://github.com/bro-gang.png">
    <div><b>BRO GANG Light</b><br><small>AI</small></div>
  </div>

  <input id="apiKey" placeholder="Paste API key" style="width:100%;padding:8px;border-radius:6px;border:none">
  <button onclick="saveKey()" style="width:100%;margin-top:5px">Save Key</button>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>
const API_URL="https://openrouter.ai/api/v1/chat/completions";
let API_KEY=localStorage.getItem("key")||"";
let history=JSON.parse(localStorage.getItem("history")||"[]");

function saveKey(){
  const key=document.getElementById("apiKey").value.trim();
  if(!key)return alert("Enter key");
  localStorage.setItem("key",key);
  API_KEY=key;
  alert("Saved ✅");
}

function addMessage(text,type){
  const msg=document.createElement("div");
  msg.className="message "+type;
  msg.innerText=text;
  document.getElementById("chat").appendChild(msg);
  window.scrollTo(0,document.body.scrollHeight);
  return msg;
}

async function send(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text)return;
  if(!API_KEY)return alert("Add API key");

  addMessage(text,"user");
  history.push({role:"user",content:text});
  input.value="";

  const botMsg=addMessage("Thinking...","bot");

  try{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"openrouter/free",
        messages:history
      })
    });

    if(!res.ok) throw new Error("API error");

    const data=await res.json();
    const reply=data?.choices?.[0]?.message?.content;

    if(!reply) throw new Error("Bad response");

    botMsg.innerText=reply;
    history.push({role:"assistant",content:reply});

  }catch(err){
    botMsg.className="message error";
    botMsg.innerText="❌ Error: check API key or settings";
  }

  localStorage.setItem("history",JSON.stringify(history));
}

// Load history
window.onload=()=>{
  history.forEach(m=>addMessage(m.content,m.role==="user"?"user":"bot"));
};

window.addEventListener("keydown",e=>{if(e.key==="Enter")send()});

// TEST CASES
// 1 Add API key → saved
// 2 Send message → AI reply
// 3 Reload → history persists
// 4 No key → alert
// 5 Wrong key → error message
</script>

</body>
</html>
